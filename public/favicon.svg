<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="oceanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#164e63;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle with ocean gradient -->
  <circle cx="16" cy="16" r="15" fill="url(#oceanGradient)" stroke="#22d3ee" stroke-width="2"/>
  
  <!-- Letter T with modern typography -->
  <text x="16" y="22" 
        font-family="Arial, sans-serif" 
        font-size="18" 
        font-weight="bold" 
        text-anchor="middle" 
        fill="white" 
        filter="url(#glow)">T</text>
  
  <!-- Subtle wave effects -->
  <path d="M 6 20 Q 16 18 26 20" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" fill="none"/>
  <path d="M 6 23 Q 16 21 26 23" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none"/>
</svg>